name: scheduled-production-workflows
on:
  workflow_dispatch:
    inputs:
      db_test:
        description: 'Schedule type'
        required: false
        default: 'true'
  # schedule:
  #   - cron: '0 1 20 * *' # Clean up every 20th day of the month at 01:00 AM UTC
  #   - cron: '1 0 1 * *'  # Sync User Subs every 1st day of the month at 00:01 AM UTC
jobs:
  tidy_up:
    name: Tidy Up Environment and Syncronise Subscriptions
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: 0
      STRIPE_TEST_KEY_OVERRIDE: 1
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      NEON_PROD_BRANCH: "main"
      SCHEDULE_TYPE: ${{ github.event_name == 'schedule'}}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'

      - name: Install Neon CLI
        run: npm install -g neonctl   
      
      - name: Grab Database URL
        run: |
          DB_CONNECTION_STRING=$(neonctl connection-string --branch "${{ env.NEON_PROD_BRANCH }}" --project-id "${{ env.NEON_PROJECT_ID }}")
          if [ -z "$DB_CONNECTION_STRING" ]; then
            echo "Database URL could not be retrieved. Exiting..."
            exit 1
          fi
          echo "DATABASE_URL=$DB_CONNECTION_STRING" >> $GITHUB_ENV
          export DATABASE_URL=$DB_CONNECTION_STRING
      
      - name: Setup Django Secret Key
        run: |
          GENERATED_KEY=$(openssl rand -base64 32)
          echo "DJANGO_SECRET_KEY=$GENERATED_KEY" >> $GITHUB_ENV
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies with Poetry
        run: |
          poetry install --no-interaction --no-ansi --no-root
      
      - name: Test Database Connection
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.db_test == 'true'
        run: |
          echo "Testing database connection..."
          poetry add psycopg2-binary
          poetry run python -c "import psycopg2; conn = psycopg2.connect('$DATABASE_URL'); print('DB Connection Successful')"
  
      - name: Print Connection Successful!
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.db_test == 'true'
        run: echo "Successfully Connected to DB"
      
      - name: Apply Django DB Migrations
        working-directory: ./src
        run: |
          poetry run python manage.py migrate
      
      
      - name: Synchronise User Subscriptions
        # if: github.event.schedule=='1 0 1 * *'
        if: github.event_name == 'schedule'
        working-directory: ./src
        run: |
          poetry run python manage.py sync_user_subscriptions --verbose --from-days 0 --to-days 1
      
      - name: Clear Unmatched Stripe Subscriptions Commands
        # if: github.event.schedule=='0 1 20 * *'
        if: github.event_name == 'schedule'
        working-directory: ./src
        run: |
          poetry run python manage.py sync_user_subscriptions --clear-dangling
